<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XGEN AI Assistant</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #ffffff;
  --bg-secondary: #f5f5f5;
  --bg-msg-user: #f0f0f0;
  --bg-msg-ai: #ffffff;
  --bg-msg-system: #fafafa;
  --bg-input: #ffffff;
  --bg-header: #fafafa;
  --bg-tool: #f5f5f5;
  --border: #e5e5e5;
  --border-input: #ddd;
  --text: #222;
  --text-secondary: #888;
  --text-tool: #666;
  --accent: #555;
  --accent-hover: #333;
  --accent-light: #f0f0f0;
  --shadow: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-msg: none;
}

.dark {
  --bg: #1a1a1a;
  --bg-secondary: #222;
  --bg-msg-user: #2a2a2a;
  --bg-msg-ai: #222;
  --bg-msg-system: #252520;
  --bg-input: #252525;
  --bg-header: #222;
  --bg-tool: #2a2a2a;
  --border: #333;
  --border-input: #444;
  --text: #ddd;
  --text-secondary: #888;
  --text-tool: #999;
  --accent: #aaa;
  --accent-hover: #ccc;
  --accent-light: #2a2a2a;
  --shadow: none;
  --shadow-msg: none;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background 0.2s, color 0.2s;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--bg-header);
  border-bottom: 1px solid var(--border);
  -webkit-user-select: none;
  user-select: none;
  z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-title { font-weight: 600; font-size: 14px; color: var(--text); letter-spacing: -0.3px; }
.header-controls { display: flex; align-items: center; gap: 6px; }

select {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 11px;
  font-family: inherit;
  padding: 3px 6px;
  outline: none;
  cursor: pointer;
}
select:focus { border-color: var(--accent); }

.icon-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  width: 28px; height: 28px;
  border-radius: 4px;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--bg-secondary); color: var(--text); }

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--bg);
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; gap: 10px; max-width: 100%; }
.msg-user { justify-content: flex-end; }
.msg-assistant, .msg-system { justify-content: flex-start; }

.msg-avatar {
  width: 24px; height: 24px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.msg-user .msg-avatar { background: var(--bg-msg-user); color: var(--text-secondary); }
.msg-assistant .msg-avatar { background: var(--bg-secondary); color: var(--text-secondary); }
.msg-system .msg-avatar { background: var(--bg-msg-system); color: var(--text-secondary); }

.msg-bubble {
  max-width: 88%;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.msg-content {
  padding: 8px 12px;
  border-radius: 8px;
  line-height: 1.6;
  word-break: break-word;
  font-size: 13.5px;
}
.msg-user .msg-content {
  background: var(--bg-msg-user);
  color: var(--text);
  border-bottom-right-radius: 2px;
}
.msg-assistant .msg-content {
  background: var(--bg-msg-ai);
  border: 1px solid var(--border);
  border-bottom-left-radius: 2px;
}
.msg-system .msg-content {
  background: var(--bg-msg-system);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-secondary);
}

/* Markdown */
.msg-content h1, .msg-content h2, .msg-content h3 {
  margin: 10px 0 4px 0;
  font-weight: 600;
  line-height: 1.3;
}
.msg-content h1 { font-size: 15px; }
.msg-content h2 { font-size: 14px; }
.msg-content h3 { font-size: 13.5px; }
.msg-content p { margin: 3px 0; }
.msg-content ul, .msg-content ol { margin: 4px 0; padding-left: 18px; }
.msg-content li { margin: 1px 0; }
.msg-content strong { font-weight: 600; }

.msg-content code {
  font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
  font-size: 12px;
  background: var(--accent-light);
  padding: 1px 4px;
  border-radius: 3px;
}
.msg-content pre {
  margin: 6px 0;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  overflow-x: auto;
}
.msg-content pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  line-height: 1.45;
}
.msg-content table {
  border-collapse: collapse;
  margin: 6px 0;
  font-size: 12px;
  width: 100%;
}
.msg-content th, .msg-content td {
  border: 1px solid var(--border);
  padding: 3px 6px;
  text-align: left;
}
.msg-content th { background: var(--bg-secondary); font-weight: 600; }

/* Tool calls */
.tool-calls { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 2px; }
.tool-call {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  background: var(--bg-tool);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-tool);
}
.tool-call.loading { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Typing */
.typing-dots { display: inline-flex; gap: 3px; padding: 2px 0; }
.typing-dots span {
  width: 5px; height: 5px;
  background: var(--text-secondary);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }

/* Input */
.input-area {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 16px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}
textarea {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border-input);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13.5px;
  resize: none;
  min-height: 38px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--text-secondary); }
textarea:disabled { opacity: 0.4; }

.send-btn {
  background: var(--text);
  border: none;
  color: var(--bg);
  width: 38px; height: 38px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s;
}
.send-btn:hover:not(:disabled) { opacity: 0.8; }
.send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

.drag-region { -webkit-app-region: drag; flex: 1; }
.header button, .header select { -webkit-app-region: no-drag; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">XGEN AI</span>
    <span class="drag-region"></span>
  </div>
  <div class="header-controls">
    <select id="providerSelect" disabled></select>
    <button class="icon-btn" onclick="toggleTheme()" title="테마 전환" id="themeBtn">☀</button>
    <button class="icon-btn" onclick="clearSession()" title="초기화">↺</button>
  </div>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="무엇을 도와드릴까요?" autofocus></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<script type="module">
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const providerSelect = document.getElementById('providerSelect');
const themeBtn = document.getElementById('themeBtn');

let isLoading = false;
let streamingText = '';
let currentStreamEl = null;
let cachedToken = null;

// ── Theme ──
function toggleTheme() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  themeBtn.textContent = isDark ? '☾' : '☀';
  localStorage.setItem('xgen-theme', isDark ? 'dark' : 'light');
}
if (localStorage.getItem('xgen-theme') === 'dark') {
  document.body.classList.add('dark');
  themeBtn.textContent = '☾';
}

// ── Markdown ──
function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="lang-$1">$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/\n/g, '<br>');
  html = html.replace(/((?:<li>.*?<\/li><br>?)+)/g, (m) => '<ul>' + m.replace(/<br>/g, '') + '</ul>');
  html = html.replace(/(<\/h[123]>|<\/pre>|<\/ul>|<\/table>)<br>/g, '$1');
  return html;
}

// ── Token ──
function getTokenSync() {
  if (cachedToken) return cachedToken;
  const params = new URLSearchParams(window.location.search);
  const p = params.get('token');
  if (p) { cachedToken = p; return p; }
  const m = document.cookie.match(/(^| )access_token=([^;]+)/);
  const c = m ? decodeURIComponent(m[2]) : null;
  if (c) { cachedToken = c; return c; }
  return null;
}
async function getToken() {
  const s = getTokenSync();
  if (s) return s;
  try {
    const t = await invoke('cli_get_token');
    if (t) { cachedToken = t; return t; }
  } catch {}
  return null;
}

// ── Providers ──
async function loadProviders() {
  try {
    const token = await getToken();
    const providers = await invoke('cli_list_providers', { xgenToken: token });
    const available = providers.filter(p => p.configured && p.available);
    providerSelect.innerHTML = available.map(p =>
      `<option value="${p.name}">${p.name} (${p.model})</option>`
    ).join('');
    if (providerSelect.querySelector('option[value="anthropic"]'))
      providerSelect.value = 'anthropic';
    providerSelect.disabled = false;
  } catch {
    providerSelect.innerHTML = '<option>anthropic</option>';
    providerSelect.disabled = false;
  }
}

// ── Messages ──
function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `msg msg-${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? 'U' : role === 'assistant' ? 'AI' : 'i';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  const contentEl = document.createElement('div');
  contentEl.className = 'msg-content';

  if (role === 'assistant' && !content) {
    contentEl.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  } else if (role === 'assistant' && content) {
    contentEl.innerHTML = renderMarkdown(content);
  } else {
    contentEl.textContent = content || '';
  }

  bubble.appendChild(contentEl);
  if (role === 'user') { msg.appendChild(bubble); msg.appendChild(avatar); }
  else { msg.appendChild(avatar); msg.appendChild(bubble); }

  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return contentEl;
}

// ── Send ──
window.sendMessage = async function() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;
  inputEl.disabled = true;
  streamingText = '';

  addMessage('user', text);
  currentStreamEl = addMessage('assistant', '');

  try {
    const token = await getToken();
    await invoke('cli_send_message', { message: text, xgenToken: token, provider: providerSelect.value });
  } catch (e) {
    addMessage('system', `오류: ${e}`);
    finishLoading();
  }
};

window.clearSession = async function() {
  try {
    await invoke('cli_clear_session');
    messagesEl.innerHTML = '';
  } catch {}
};

function finishLoading() {
  if (currentStreamEl && streamingText) {
    currentStreamEl.innerHTML = renderMarkdown(streamingText);
  }
  isLoading = false;
  sendBtn.disabled = false;
  inputEl.disabled = false;
  inputEl.focus();
  currentStreamEl = null;
}

// ── Debounced markdown render during streaming ──
let renderTimer = null;
function scheduleRender() {
  if (renderTimer) return;
  renderTimer = setTimeout(() => {
    if (currentStreamEl && streamingText) {
      currentStreamEl.innerHTML = renderMarkdown(streamingText);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    renderTimer = null;
  }, 150);
}

// ── Events ──
listen('cli:event', (event) => {
  const { eventType, data } = event.payload;
  switch (eventType) {
    case 'token':
      streamingText += (typeof data === 'string' ? data : '');
      scheduleRender();
      break;

    case 'tool_call_start':
    case 'tool_call':
      if (currentStreamEl) {
        let bubble = currentStreamEl.closest('.msg-bubble') || currentStreamEl.parentElement;
        let toolsEl = bubble.querySelector('.tool-calls');
        if (!toolsEl) {
          toolsEl = document.createElement('div');
          toolsEl.className = 'tool-calls';
          bubble.insertBefore(toolsEl, currentStreamEl);
        }
        const tc = document.createElement('span');
        tc.className = 'tool-call loading';
        const name = data.name || '';
        if (name === 'search_tools') tc.textContent = `🔍 ${data.input?.query || '...'}`;
        else if (name === 'call_tool') tc.textContent = `⚡ ${data.input?.tool_name || '...'}`;
        else if (name === 'navigate') tc.textContent = `→ ${data.input?.path || ''}`;
        else if (name.startsWith('canvas_')) tc.textContent = `◻ ${name.replace('canvas_','')}`;
        else tc.textContent = name;
        toolsEl.appendChild(tc);
      }
      break;

    case 'tool_result':
      if (currentStreamEl) {
        const bubble = currentStreamEl.closest('.msg-bubble') || currentStreamEl.parentElement;
        bubble?.querySelectorAll('.tool-call.loading').forEach(t => t.classList.remove('loading'));
      }
      break;

    case 'done':
      if (currentStreamEl && !streamingText) {
        currentStreamEl.innerHTML = renderMarkdown(typeof data === 'string' ? data : '');
      }
      finishLoading();
      break;

    case 'error':
      addMessage('system', `오류: ${typeof data === 'string' ? data : JSON.stringify(data)}`);
      finishLoading();
      break;
  }
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ── Init ──
(async () => {
  const t = await getToken();
  if (!t) addMessage('system', '인증 토큰이 없습니다. 로그인 후 다시 열어주세요.');
  loadProviders();
})();
</script>
</body>
</html>
