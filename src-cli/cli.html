<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XGEN AI CLI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
  font-size: 13px;
  background: #0d1117;
  color: #c9d1d9;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  -webkit-user-select: none;
  user-select: none;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-title { font-weight: 600; font-size: 14px; color: #58a6ff; }
.header-controls { display: flex; align-items: center; gap: 8px; }

select {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 4px;
  color: #c9d1d9;
  font-size: 11px;
  font-family: inherit;
  padding: 3px 6px;
  outline: none;
  cursor: pointer;
}
select:focus { border-color: #58a6ff; }
select option { background: #161b22; }

.btn {
  background: none;
  border: 1px solid #30363d;
  color: #8b949e;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 14px;
  transition: all 0.15s;
}
.btn:hover { background: #21262d; color: #c9d1d9; }

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

.msg { display: flex; flex-direction: column; gap: 4px; }
.msg-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.msg-user .msg-label { color: #58a6ff; }
.msg-assistant .msg-label { color: #7ee787; }
.msg-system .msg-label { color: #d29922; }

.msg-content {
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.6;
  padding: 8px 12px;
  border-radius: 6px;
}
.msg-user .msg-content { background: #161b22; border-left: 3px solid #58a6ff; }
.msg-assistant .msg-content { background: #0d1117; border-left: 3px solid #7ee787; }
.msg-system .msg-content { background: #1c1e24; border-left: 3px solid #d29922; font-size: 12px; color: #8b949e; }

.tool-calls { display: flex; flex-wrap: wrap; gap: 6px; padding-left: 12px; }
.tool-call {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 12px;
  font-size: 11px;
  color: #fbbf24;
}

/* Input */
.input-area {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 12px 16px;
  background: #161b22;
  border-top: 1px solid #30363d;
}
textarea {
  flex: 1;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #c9d1d9;
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  resize: none;
  min-height: 36px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: #58a6ff; }
textarea::placeholder { color: #484f58; }
textarea:disabled { opacity: 0.5; }

.send-btn {
  background: #238636;
  border: none;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.send-btn:hover:not(:disabled) { background: #2ea043; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Drag region for Tauri window */
.drag-region {
  -webkit-app-region: drag;
  flex: 1;
}
.header button, .header select { -webkit-app-region: no-drag; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">⚡ XGEN AI CLI</span>
    <span class="drag-region"></span>
  </div>
  <div class="header-controls">
    <select id="providerSelect" disabled></select>
    <button class="btn" onclick="clearSession()" title="세션 초기화">↺</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="msg msg-system">
    <div class="msg-label">System</div>
    <div class="msg-content">XGEN AI CLI에 오신 것을 환영합니다.
자연어로 명령을 입력하세요.

예: "워크플로우 목록 보여줘", "LLM 상태 확인해줘"</div>
  </div>
</div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="명령을 입력하세요... (예: 워크플로우 목록 보여줘)" autofocus></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">→</button>
</div>

<script type="module">
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;
const { getCurrentWindow } = window.__TAURI__.window;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const providerSelect = document.getElementById('providerSelect');

let isLoading = false;
let streamingText = '';
let currentStreamEl = null;

// Auth token cache
let cachedToken = null;

// Get auth token: URL param → cookie → Rust session
function getTokenSync() {
  if (cachedToken) return cachedToken;
  // 1. URL query param (passed by open_cli_window)
  const params = new URLSearchParams(window.location.search);
  const paramToken = params.get('token');
  if (paramToken) {
    console.log('[CLI] Token from URL param');
    cachedToken = paramToken;
    return paramToken;
  }
  // 2. Cookie fallback (same origin in Tauri webview)
  const match = document.cookie.match(/(^| )access_token=([^;]+)/);
  const cookieToken = match ? decodeURIComponent(match[2]) : null;
  if (cookieToken) {
    console.log('[CLI] Token from cookie');
    cachedToken = cookieToken;
    return cookieToken;
  }
  return null;
}

// Async token getter: also tries Rust session as last resort
async function getToken() {
  const syncToken = getTokenSync();
  if (syncToken) return syncToken;
  // 3. Rust session fallback (token stored when open_cli_window was called)
  try {
    const rustToken = await invoke('cli_get_token');
    if (rustToken) {
      console.log('[CLI] Token from Rust session');
      cachedToken = rustToken;
      return rustToken;
    }
  } catch (e) {
    console.warn('[CLI] Failed to get token from Rust:', e);
  }
  console.warn('[CLI] No auth token found!');
  return null;
}

// Load providers
async function loadProviders() {
  try {
    const token = await getToken();
    const providers = await invoke('cli_list_providers', { xgenToken: token });
    const available = providers.filter(p => p.configured && p.available);
    providerSelect.innerHTML = available.map(p =>
      `<option value="${p.name}">${p.name} (${p.model})</option>`
    ).join('');
    // Default to anthropic
    if (providerSelect.querySelector('option[value="anthropic"]')) {
      providerSelect.value = 'anthropic';
    }
    providerSelect.disabled = false;
  } catch (e) {
    console.error('Failed to load providers:', e);
    providerSelect.innerHTML = '<option>anthropic</option>';
    providerSelect.disabled = false;
  }
}

// Add message to UI
function addMessage(role, content, toolCalls) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : role === 'assistant' ? 'AI' : 'System';
  div.appendChild(label);

  const contentEl = document.createElement('div');
  contentEl.className = 'msg-content';
  contentEl.textContent = content || '...';
  div.appendChild(contentEl);

  if (toolCalls && toolCalls.length > 0) {
    const toolsEl = document.createElement('div');
    toolsEl.className = 'tool-calls';
    toolCalls.forEach(t => {
      const tc = document.createElement('span');
      tc.className = 'tool-call';
      tc.textContent = `⚡ ${t.name}`;
      toolsEl.appendChild(tc);
    });
    div.appendChild(toolsEl);
  }

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return contentEl;
}

// Send message
window.sendMessage = async function() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  inputEl.value = '';
  isLoading = true;
  sendBtn.disabled = true;
  sendBtn.textContent = '...';
  inputEl.disabled = true;
  streamingText = '';

  addMessage('user', text);
  currentStreamEl = addMessage('assistant', '');

  try {
    const token = await getToken();
    await invoke('cli_send_message', {
      message: text,
      xgenToken: token,
      provider: providerSelect.value,
    });
  } catch (e) {
    addMessage('system', `오류: ${e}`);
    finishLoading();
  }
};

// Clear session
window.clearSession = async function() {
  try {
    await invoke('cli_clear_session');
    messagesEl.innerHTML = '';
    addMessage('system', '세션이 초기화되었습니다.');
  } catch (e) {
    console.error(e);
  }
};

function finishLoading() {
  isLoading = false;
  sendBtn.disabled = false;
  sendBtn.textContent = '→';
  inputEl.disabled = false;
  inputEl.focus();
  currentStreamEl = null;
}

// Listen for streaming events
listen('cli:event', (event) => {
  const { eventType, data } = event.payload;

  switch (eventType) {
    case 'token':
      streamingText += (typeof data === 'string' ? data : '');
      if (currentStreamEl) currentStreamEl.textContent = streamingText;
      messagesEl.scrollTop = messagesEl.scrollHeight;
      break;

    case 'tool_call_start':
    case 'tool_call':
      if (currentStreamEl && currentStreamEl.parentElement) {
        let toolsEl = currentStreamEl.parentElement.querySelector('.tool-calls');
        if (!toolsEl) {
          toolsEl = document.createElement('div');
          toolsEl.className = 'tool-calls';
          currentStreamEl.parentElement.appendChild(toolsEl);
        }
        const tc = document.createElement('span');
        tc.className = 'tool-call';
        tc.textContent = `⚡ ${data.name}`;
        toolsEl.appendChild(tc);
      }
      break;

    case 'done':
      if (currentStreamEl && !streamingText) {
        currentStreamEl.textContent = typeof data === 'string' ? data : '';
      }
      finishLoading();
      break;

    case 'error':
      addMessage('system', `오류: ${typeof data === 'string' ? data : JSON.stringify(data)}`);
      finishLoading();
      break;
  }
});

// Enter to send, Shift+Enter for newline
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    window.sendMessage();
  }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Initialize
(async () => {
  const initToken = await getToken();
  if (!initToken) {
    addMessage('system', '⚠️ 인증 토큰이 없습니다. 로그인 후 AI CLI를 다시 열어주세요.');
  } else {
    addMessage('system', '✅ 인증 완료. 명령을 입력하세요.');
  }
  loadProviders();
})();
</script>
</body>
</html>
