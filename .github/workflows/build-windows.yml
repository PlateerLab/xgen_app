name: Build Windows App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Clone frontend from GitLab
        run: |
          git clone --depth 1 --branch main "https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.x2bee.com/tech-team/ai-team/xgen/xgen-frontend.git" frontend

      - name: Install frontend dependencies
        working-directory: frontend
        env:
          HUSKY: "0"
        run: npm install --ignore-scripts

      - name: Build frontend (Next.js)
        working-directory: frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx next build

      - name: Prepare frontend dist
        shell: pwsh
        run: |
          # Next.js output을 Tauri가 바라보는 dist/로 복사
          $outDir = "frontend/out"
          $nextDir = "frontend/.next"
          if (Test-Path $outDir) {
            Copy-Item -Path "$outDir" -Destination "dist" -Recurse -Force
          } elseif (Test-Path "$nextDir/static") {
            New-Item -ItemType Directory -Path "dist" -Force | Out-Null
            # standalone 모드면 .next에서 필요한 파일 복사
            Copy-Item -Path "$nextDir/static" -Destination "dist/_next/static" -Recurse -Force
            if (Test-Path "frontend/public") {
              Copy-Item -Path "frontend/public/*" -Destination "dist/" -Recurse -Force
            }
          }
          Write-Output "=== dist directory ==="
          if (Test-Path "dist") { Get-ChildItem "dist" -Recurse | Select-Object -First 15 }
          else { Write-Output "WARNING: dist directory not created" }

      - name: Build Tauri app (Windows)
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: xgen-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: xgen-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
